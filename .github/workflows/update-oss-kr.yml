name: Update kr.txt on OSS

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发
  workflow_run:
    workflows: ["Update kr.txt from JSON"]  # 监听指定工作流
    types:
      - completed  # 当工作流完成时触发
    branches: [main]

jobs:
  update-oss-file:
    runs-on: ubuntu-latest
    # 简化条件：允许所有触发方式，但对workflow_run添加额外条件
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      # 步骤 1: 等待1分钟延迟（仅在workflow_run触发时等待）
      - name: Wait for 1 minute on workflow_run
        if: github.event_name == 'workflow_run'
        run: sleep 60
        shell: bash

      # 步骤 2: 检出你的仓库代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 步骤 3: 验证目标文件是否存在
      - name: Verify kr.txt exists
        run: |
          if [ -f "./kr.txt" ]; then
            echo "✅ kr.txt 文件存在，文件内容如下："
            cat ./kr.txt
          else
            echo "❌ 错误：仓库根目录下未找到 kr.txt 文件"
            echo "当前工作目录文件列表："
            ls -la
            exit 1
          fi

      # 步骤 4: 通过官方脚本安装ossutil
      - name: Install ossutil via official script
        run: |
          echo "开始通过官方脚本安装 ossutil..."
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          echo "✅ 官方脚本执行完毕"

      # 步骤 5: 验证ossutil安装
      - name: Verify ossutil installation
        run: |
          echo "检查ossutil是否可用..."
          ossutil --version
          echo "✅ ossutil 安装验证成功"

      # 步骤 6: 上传文件到OSS
      - name: Upload kr.txt to OSS
        run: |
          echo "开始上传 kr.txt 到 OSS..."
          ossutil cp ./kr.txt oss://kortv/kr.txt -f \
            -e oss-cn-hangzhou.aliyuncs.com \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          echo "✅ 文件上传命令执行完成"

      # 步骤 7: 验证上传结果
      - name: Verify upload success
        run: |
          echo "验证文件是否已成功上传至OSS..."
          ossutil stat oss://kortv/kr.txt \
            -e oss-cn-hangzhou.aliyuncs.com \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          echo "🎉 kr.txt 文件已成功上传至阿里云 OSS！"

      # 步骤 8: 任务完成总结
      - name: Upload completion summary
        run: |
          echo "=========================================="
          echo "🚀 OSS 文件同步任务已完成！"
          echo "📦 Bucket: kortv"
          echo "📄 文件: kr.txt"
          echo "📍 Endpoint: oss-cn-hangzhou.aliyuncs.com"
          echo "⏰ 完成时间: $(date)"
          echo "🔗 触发方式: ${{ github.event_name }}"
          echo "=========================================="

name: Update Korea Links

on:
  schedule:
    - cron: '0 */8 * * *'  # 修改为每8小时运行一次（每2小时的0分）
  workflow_dispatch:     # 允许手动触发

jobs:
  update-links:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run first update script (KBS PHP TXT Links)
      id: script1
      run: |
        echo "运行第一个更新脚本: update_korea_kbsphp_txt_links.py"
        python update_korea_kbsphp_txt_links.py
        echo "script1_status=$?" >> $GITHUB_OUTPUT
    
    - name: Run second update script (Korea Links)
      id: script2
      run: |
        echo "运行第二个更新脚本: update_KRK_txt_links.py"
        python update_KRK_txt_links.py
        echo "script2_status=$?" >> $GITHUB_OUTPUT
    
    - name: Check scripts execution status
      run: |
        echo "脚本1执行状态: ${{ steps.script1.outputs.script1_status }}"
        echo "脚本2执行状态: ${{ steps.script2.outputs.script2_status }}"
        if [ "${{ steps.script1.outputs.script1_status }}" != "0" ] || [ "${{ steps.script2.outputs.script2_status }}" != "0" ]; then
          echo "警告: 部分脚本执行失败"
        else
          echo "所有脚本执行成功"
        fi
    
    - name: Commit and push if changed
      id: commit
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git stash
        git pull origin main --rebase
        git stash pop
        git add -A
        if ! git diff --cached --quiet; then
          git commit -m "自动更新: 更新韩国频道播放链接"
          git pull origin main --rebase
          git push origin main
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "No changes detected"
          echo "changes=false" >> $GITHUB_OUTPUT
        fi

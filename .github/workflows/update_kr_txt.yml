name: Update kr.txt from JSON

on:
  # 当 Sync koreatv.json from kenpark76 工作流成功完成时触发
  workflow_run:
    workflows: ["Sync koreatv.json from kenpark76"]  # 监听指定的工作流
    types:
      - completed  # 当工作流完成时触发
    branches: [main]
  
  # 保留手动触发，方便测试
  workflow_dispatch:
  
  # 也保留定时触发作为备份（每天2次）
  schedule:
    - cron: '0 19 * * *'    # UTC 19:00 = 北京时间 03:00
    - cron: '0 7 * * *'     # UTC 07:00 = 北京时间 15:00

jobs:
  generate-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送到仓库
    
    # 添加执行条件：只有被监听的工作流成功完成时才执行
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 当通过 workflow_run 触发时，添加短暂延迟确保文件完全写入
      - name: Wait for 10 seconds on workflow_run
        if: github.event_name == 'workflow_run'
        run: sleep 10
      
      - name: Check if koreatv.json exists
        id: check_file
        run: |
          if [ -f "koreatv.json" ]; then
            echo "✅ 找到 koreatv.json"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "size=$(wc -c < koreatv.json)" >> $GITHUB_OUTPUT
          else
            echo "❌ koreatv.json 不存在"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check if Python script exists
        id: check_script
        run: |
          if [ -f "generate_koreatv_txt.py" ]; then
            echo "✅ 找到 generate_koreatv_txt.py"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ generate_koreatv_txt.py 不存在"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check if kr.txt exists
        id: check_output_file
        run: |
          if [ -f "kr.txt" ]; then
            echo "✅ 找到现有的 kr.txt"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "size=$(wc -c < kr.txt)" >> $GITHUB_OUTPUT
            echo "lines=$(wc -l < kr.txt)" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ kr.txt 不存在，将创建新文件"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Display triggering workflow info (for debugging)
        if: github.event_name == 'workflow_run'
        run: |
          echo "🔍 被工作流触发："
          echo "   - 工作流名称: ${{ github.event.workflow_run.name }}"
          echo "   - 工作流状态: ${{ github.event.workflow_run.conclusion }}"
          echo "   - 触发分支: ${{ github.event.workflow_run.head_branch }}"
          echo "   - 提交SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "   - 运行ID: ${{ github.event.workflow_run.id }}"
      
      - name: Generate/Update kr.txt
        if: steps.check_file.outputs.exists == 'true' && steps.check_script.outputs.exists == 'true'
        id: generate
        run: |
          python generate_koreatv_txt.py
          
          # 检查生成的文件
          if [ -f "kr.txt" ] && [ -s "kr.txt" ]; then
            echo "created=true" >> $GITHUB_OUTPUT
            echo "lines=$(wc -l < kr.txt)" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Commit and push changes
        if: steps.generate.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有变化
          git add kr.txt
          if git diff --staged --quiet; then
            echo "ℹ️ kr.txt 没有变化，无需提交"
          else
            git commit -m "📺 自动更新 kr.txt 中的'新韩国电视'分组 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
            echo "✅ 已提交更新"
          fi
      
      - name: Upload kr.txt as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kr-channel-list
          path: kr.txt
          retention-days: 7
      
      - name: Generate summary
        if: always()
        run: |
          echo "## 📺 kr.txt 更新结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 显示触发方式
          echo "### 🔄 触发信息" >> $GITHUB_STEP_SUMMARY
          echo "- **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "- **触发工作流**: Sync koreatv.json from kenpark76" >> $GITHUB_STEP_SUMMARY
            echo "- **工作流状态**: ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_file.outputs.exists }}" == "true" ]; then
            echo "### ✅ JSON源文件信息" >> $GITHUB_STEP_SUMMARY
            echo "- **文件**: koreatv.json" >> $GITHUB_STEP_SUMMARY
            echo "- **大小**: ${{ steps.check_file.outputs.size }} 字节" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "${{ steps.check_output_file.outputs.exists }}" == "true" ]; then
              echo "### 📄 原kr.txt信息" >> $GITHUB_STEP_SUMMARY
              echo "- **大小**: ${{ steps.check_output_file.outputs.size }} 字节" >> $GITHUB_STEP_SUMMARY
              echo "- **行数**: ${{ steps.check_output_file.outputs.lines }}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "${{ steps.generate.outputs.created }}" == "true" ]; then
              echo "### ✅ 更新成功" >> $GITHUB_STEP_SUMMARY
              echo "- **输出文件**: kr.txt" >> $GITHUB_STEP_SUMMARY
              echo "- **总行数**: ${{ steps.generate.outputs.lines }}" >> $GITHUB_STEP_SUMMARY
              echo "- **文件大小**: $(du -h kr.txt | cut -f1)" >> $GITHUB_STEP_SUMMARY
              echo "- **更新内容**: '新韩国电视' 分组已从koreatv.json更新" >> $GITHUB_STEP_SUMMARY
              
              # 显示新分组的前几个频道作为预览
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 📋 '新韩国电视' 分组预览（前5个）" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              # 提取"新韩国电视"分组的内容显示
              awk '/^新韩国电视,#genre#$/{flag=1; next} /^$/{flag=0} flag && !/^#/' kr.txt | head -5 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ 生成失败" >> $GITHUB_STEP_SUMMARY
              echo "请检查Python脚本执行日志" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ❌ 错误" >> $GITHUB_STEP_SUMMARY
            echo "找不到 koreatv.json 文件" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.check_script.outputs.exists }}" == "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ 错误" >> $GITHUB_STEP_SUMMARY
            echo "找不到 generate_koreatv_txt.py 文件" >> $GITHUB_STEP_SUMMARY
          fi

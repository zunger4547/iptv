name: Sync koreatv.json from kenpark76

on:
  schedule:
    # 改为每小时的第20分钟运行，避开整点拥堵
    - cron: '20 * * * *'
  workflow_dispatch:  # 保留手动触发
  push:
    paths:
      - '.github/workflows/sync_koreatv.yml'  # 工作流文件更新时自动触发

jobs:
  sync-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Add timestamp
        id: timestamp
        run: echo "time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Download file from upstream
        run: |
          echo "正在从 kenpark76.github.io 下载 koreatv.json..."
          mkdir -p temp_download
          curl -L -o temp_download/koreatv.json https://raw.githubusercontent.com/kenpark76/kenpark76.github.io/main/koreatv.json
          
          if [ ! -f temp_download/koreatv.json ]; then
            echo "❌ 文件下载失败"
            exit 1
          fi
          
          echo "✅ 文件下载成功"
          ls -lh temp_download/koreatv.json

      - name: Check if file changed
        id: check_diff
        run: |
          if [ ! -f koreatv.json ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            if diff -q temp_download/koreatv.json koreatv.json > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Copy and commit updated file
        if: steps.check_diff.outputs.changed == 'true'
        run: |
          cp temp_download/koreatv.json ./koreatv.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add koreatv.json
          git commit -m "🔄 自动更新 koreatv.json [${{ steps.timestamp.outputs.time }}]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
          echo "✅ 文件已更新并推送"

      - name: Clean up
        if: always()
        run: rm -rf temp_download

      - name: 同步结果摘要
        if: always()
        run: |
          echo "## 📊 同步结果" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_diff.outputs.changed }}" == "true" ]; then
            echo "✅ **koreatv.json 已更新**" >> $GITHUB_STEP_SUMMARY
            echo "- 更新时间：${{ steps.timestamp.outputs.time }}" >> $GITHUB_STEP_SUMMARY
            echo "- 来源：kenpark76/kenpark76.github.io" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **koreatv.json 无需更新**（与原文件一致）" >> $GITHUB_STEP_SUMMARY
          fi
